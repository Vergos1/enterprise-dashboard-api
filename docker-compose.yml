version: '3.8'

services:
  db:
    image: postgres:16.3-alpine
    container_name: my_postgres_db
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./dump.dump:/docker-entrypoint-initdb.d/dump.dump
    ports:
      - "5433:5432"
    networks:
      - my_network
    entrypoint: [ "bash", "-c", "pg_restore -U postgres -d dev_db /docker-entrypoint-initdb.d/dump.dump || true && docker-entrypoint.sh postgres" ]

  admin-backend:
    build:
       context: .
       target: development
    container_name: admin_backend
    environment:
      DATABASE_TYPE: ${DATABASE_TYPE}
      DATABASE_HOST: ${DATABASE_HOST} 
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNCHRONIZE}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS}
      DATABASE_SSL_ENABLED: ${DATABASE_SSL_ENABLED}
      DATABASE_REJECT_UNAUTHORIZED: ${DATABASE_REJECT_UNAUTHORIZED}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules 
    depends_on:
      - db
    networks:
      - my_network
volumes:
  postgres_data:

networks:
  my_network:


